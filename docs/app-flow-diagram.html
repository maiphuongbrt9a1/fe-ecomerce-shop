<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Sơ đồ luồng ứng dụng — e-commerce</title>
<style>
  :root {
    --bg: #EFEAE2;
    --node-bg: #FFFFFF;
    --node-border: #C9C2B5;
    --title: #1A1A1A;
    --route: #6A6A6A;
    --arrow: #2F2F2F;
    --arrow-soft: #6B6B6B;
    --label: #2F2F2F;
    --label-bg: #FFFFFF;
    --stripe-store: #2C5F5D;
    --stripe-user:  #574A75;
    --stripe-auth:  #B05538;
    --stripe-admin: #7E3140;
    --stripe-staff: #3F6B4E;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #DAD3C5;
    font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--title);
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .frame {
    width: 100%;
    max-width: 1920px;
    aspect-ratio: 16 / 9;
    background: var(--bg);
    border-radius: 0;
    box-shadow: 0 10px 50px rgba(0,0,0,0.12);
  }
  svg { display: block; width: 100%; height: 100%; border-radius: 0; }
  svg rect { rx: 0; ry: 0; }
</style>
</head>

      .node-route  { font-size: 11px; fill: #6A6A6A;

      .stripe-user  { fill: #574A75; }
      .stripe-auth  { fill: #B05538; }
      .stripe-admin { fill: #7E3140; }
      .stripe-staff { fill: #3F6B4E; }

      .edge      { fill: none; stroke: #2F2F2F; stroke-width: 1.6; }
      .edge.soft { stroke: #6B6B6B; stroke-width: 1.2; }
      .edge.dashed { stroke-dasharray: 5 4; }
